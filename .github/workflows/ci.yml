name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check bioagent/

      - name: Run unit and export tests (no external API calls)
        run: |
          pytest tests/ -m "not api and not slow" \
            --cov=bioagent \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy
        run: mypy bioagent/ --ignore-missing-imports

  reproducibility:
    name: Reproducibility smoke test (Docker + dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify lock file exists
        run: test -f requirements-lock.txt

      - name: Build Docker image
        run: docker build -t bioagent:ci .

      - name: Graph compile dry-run in container
        run: |
          docker run --rm bioagent:ci python -c "
          from bioagent.graph.research_graph import compile_research_graph
          g = compile_research_graph()
          nodes = list(g.get_graph().nodes)
          assert 'data_acquisition' in nodes
          print('OK: graph compiles with', len(nodes), 'nodes')
          "
